<!doctype html><html lang="ja"><head><meta http-equiv="Content-Security-Policy" content="__VIEW_CSP__">
<meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>__VIEW_TITLE__</title><style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2330;--line:#2d3648;--fg:#d6dde8;--dim:#7d8899;--accent:#7aa2f7;--read:#2dd4bf;--w5:#facc15;--w1:#fb923c;--in:#94a3b8;--out:#f472b6}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:12px/1.5 SFMono-Regular,Menlo,Consolas,monospace}header,main,footer{max-width:1400px;margin:auto;padding:18px 24px}header{border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:20px;align-items:end}h1{font-size:18px;margin:0 0 4px;color:#fff;white-space:nowrap}header>div:first-child{flex-shrink:0}h2{font-size:14px;margin:24px 0 8px}.dim{color:var(--dim)}.total{font-size:14px;text-align:right}.tabs{display:flex;gap:6px;margin:16px 0 10px;flex-wrap:wrap}button{font:inherit;color:var(--dim);background:var(--bg2);border:1px solid var(--line);padding:6px 13px;cursor:pointer}button.on{color:#fff;border-color:var(--accent)}button:focus-visible,th[data-sortable]:focus-visible{outline:3px solid #fff;outline-offset:2px}.panel{display:none}.panel.on{display:block}.card{background:var(--bg2);border:1px solid var(--line);padding:12px;overflow:auto}table{border-collapse:collapse;width:100%;white-space:nowrap}th,td{padding:7px 8px;border-bottom:1px solid var(--line);text-align:right}th{position:sticky;top:0;background:var(--bg2);color:var(--dim);font-weight:normal}th.left,td.left{text-align:left}code{color:#b8c5d9;background:var(--bg3);padding:2px 4px}.barcell{display:inline-flex;width:132px;align-items:center;justify-content:space-between;vertical-align:middle}.barcell b{display:inline-block;width:65px;text-align:right}.bar{display:inline-block;width:60px;height:7px;background:var(--bg3);vertical-align:middle}.bar i{display:block;height:100%;background:var(--accent)}th[data-sortable]{cursor:pointer;user-select:none}.dot,.legend i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}.insight{border-left:3px solid var(--accent);padding:7px 10px;margin:8px 0 12px;background:var(--bg2)}.legend{display:flex;gap:16px;flex-wrap:wrap;margin:8px 0;color:var(--dim)}svg{width:100%;height:auto;display:block}footer{margin-top:25px;border-top:1px solid var(--line);color:var(--dim);display:flex;justify-content:space-between}.warn{color:#f87171}[hidden]{display:none!important}@media(max-width:700px){header,footer{display:block}header,main,footer{padding:14px 12px}.total{text-align:left;margin-top:8px}.card{padding:8px}}@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important}}@media print{body{background:#fff;color:#111}header,main,footer{max-width:none}.card,.insight{background:#fff;border-color:#777}th{position:static;background:#fff;color:#333}button{display:none}.dim,footer{color:#444}}
.clip{display:block;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.project-clip{display:block;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style></head><body><header><div><h1>__VIEW_H1__</h1><div class="dim">__VIEW_PERIOD__</div></div><div class="total">__VIEW_TOTAL__</div></header><main>__VIEW_BODY__</main><footer><span>__VIEW_STAMP__</span></footer><script>
const activate=(el,fn)=>{el.addEventListener('click',fn);el.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();fn()}})};
document.querySelectorAll('[data-tab]').forEach(b=>activate(b,()=>{let g=b.parentNode.dataset.group;document.querySelectorAll('[data-group="'+g+'"] [data-tab]').forEach(x=>{x.classList.remove('on');x.setAttribute('aria-selected','false')});b.classList.add('on');b.setAttribute('aria-selected','true');document.querySelectorAll('.panel[data-group="'+g+'"]').forEach(x=>{let on=x.id===b.dataset.tab;x.classList.toggle('on',on);x.hidden=!on})}));
document.querySelectorAll('th[data-sortable]').forEach(h=>activate(h,()=>{let table=h.closest('table'),heads=[...h.parentNode.children],i=heads.indexOf(h),dir=h.dataset.dir==='desc'?'asc':'desc';heads.forEach(x=>{if(x.dataset.sortable!==undefined){x.textContent=x.dataset.label||x.textContent.replace(/ [▼▲]$/,'');x.dataset.label=x.textContent;delete x.dataset.dir;x.setAttribute('aria-sort','none')}});h.dataset.dir=dir;h.setAttribute('aria-sort',dir==='desc'?'descending':'ascending');h.textContent=h.dataset.label+(dir==='desc'?' ▼':' ▲');let body=table.tBodies[0],rows=[...body.rows];rows.sort((a,b)=>{let x=a.cells[i].dataset.sort||'',y=b.cells[i].dataset.sort||'',xn=Number(x),yn=Number(y),cmp=Number.isNaN(xn)||Number.isNaN(yn)?x.localeCompare(y,'ja'):xn-yn;return dir==='desc'?-cmp:cmp});rows.forEach(r=>body.appendChild(r))}));
document.querySelectorAll('[data-grain]').forEach(b=>activate(b,()=>{document.querySelectorAll('[data-grain]').forEach(x=>{x.classList.remove('on');x.setAttribute('aria-selected','false')});b.classList.add('on');b.setAttribute('aria-selected','true');document.querySelectorAll('[data-grain-panel]').forEach(x=>{let on=x.dataset.grainPanel===b.dataset.grain;x.style.display=on?'block':'none';x.hidden=!on})}));
</script></body></html>
